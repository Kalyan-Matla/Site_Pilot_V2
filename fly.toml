# Fly.io app config — https://fly.io/docs/reference/configuration/
# Deploy: flyctl launch --no-deploy --copy-config (claims an app name), then
# flyctl volumes create sitepilot_data --size 1, set JWT_SECRET, flyctl deploy.
app = "sitepilot"
primary_region = "bom"

[build]

[env]
  PORT = "8000"
  DATA_DIR = "/data"
  JWT_HOURS = "12"
  ALERT_INTERVAL_HOURS = "24"
  ALLOW_SIGNUP = "0"

[[mounts]]
  source = "sitepilot_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
