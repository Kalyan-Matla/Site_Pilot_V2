# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard -> New + -> Blueprint -> pick this repo -> Apply.
# Builds the Dockerfile as-is; JWT_SECRET is auto-generated by Render.
services:
  - type: web
    name: sitepilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_HOURS
        value: "12"
      - key: ALERT_INTERVAL_HOURS
        value: "24"
      - key: ALLOW_SIGNUP
        value: "0"
    healthCheckPath: /api/health
    # Free tier has ephemeral disk, so data resets on restart/redeploy.
    # To persist real data, attach a paid disk and point DATA_DIR at it:
    # disk:
    #   name: sitepilot-data
    #   mountPath: /data
    #   sizeGB: 1
